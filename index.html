<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Pokédex Accessible</title>
    <!-- On lie notre fichier CSS pour le côté visuel (v4 pour vider le cache) -->
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>

    <!-- Sémantique: <main> au lieu de <div> pour la zone principale du site -->
    <main class="pokedex">
        
        <!-- Sémantique: <header> pour l'en-tête de l'appareil -->
        <header class="partie-haute">
            <div class="lentille-principale"></div>
            <div class="petites-lumieres">
                <div class="lumiere rouge"></div>
                <div class="lumiere jaune"></div>
                <div class="lumiere verte"></div>
            </div>
        </header>

        <!-- Sémantique: <section> pour regrouper l'écran -->
        <section class="contour-ecran">
            
            <div class="petites-lumieres-ecran">
                <div class="lumiere-ecran-rouge"></div>
                <div class="lumiere-ecran-rouge"></div>
            </div>
            
            <article class="ecran-interieur">
                
                <div class="barre-recherche">
                    <!-- Accessibilité (WCAG): Ajout d'un aria-label pour les lecteurs d'écran (aveugles/malvoyants) -->
                    <input type="text" id="champ-recherche" placeholder="Rechercher un Pokémon..." aria-label="Rechercher un Pokémon par son nom">
                </div>
                
                <!-- Accessibilité: aria-live="polite" force le lecteur vocal à dicter ce message quand il change (ex: Erreur) -->
                <div aria-live="polite" id="zone-messages">
                    <p id="message-chargement">Chargement des données en cours...</p>
                </div>
                
                <div id="grille-pokemon">
                    <!-- Généré par le JavaScript -->
                </div>

            </article>
            
            <div class="bouton-rond-rouge"></div>
        </section>

        <!-- Sémantique: <nav> pour la zone de navigation -->
        <nav class="partie-basse">
            <div class="bouton-rond-noir"></div>
            
            <!-- aria-live lit le nouveau numéro de page -->
            <div class="ecran-vert-page" aria-live="polite">
                <span id="numero-page">Page 1</span>
            </div>

            <div class="boutons-pagination">
                <button id="btn-prec" aria-label="Page précédente">◀ Précédent</button>
                <button id="btn-suiv" aria-label="Page suivante">Suivant ▶</button>
            </div>
            
            <div class="croix-directionnelle"></div>
        </nav>

    </main>

    <!-- La fenêtre popup. aria-labelledby la lie à son titre pour l'accessibilité -->
    <dialog id="modale-details" aria-labelledby="modale-nom" aria-modal="true">
        <!-- Bouton de retour tel que demandé dans les exigences -->
        <button id="btn-fermer-modale">Retour à la liste</button>
        
        <h2 id="modale-nom">Nom</h2>
        
        <div class="modale-images">
            <!-- Images Face et Dos (exigence) -->
            <img id="modale-image-front" src="" alt="Image de face">
            <img id="modale-image-back" src="" alt="Image de dos" style="display:none;">
        </div>
        
        <div class="modale-infos">
            <p><strong>Type(s) :</strong> <span id="modale-types"></span></p>
            <p><strong>Poids :</strong> <span id="modale-poids"></span> kg | <strong>Taille :</strong> <span id="modale-taille"></span> m</p>
            
            <hr>
            <p><strong>Statistiques :</strong></p>
            <ul id="modale-stats-liste"></ul>
            
            <hr>
            <p><strong>Capacités :</strong> <span id="modale-capacites"></span></p>
            
            <hr>
            <p><strong>Évolutions :</strong> <span id="modale-evolutions">Chargement...</span></p>
        </div>
    </dialog>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
